# SonarCloud Configuration
# Project: Collaborative Google Docs
# Connect at: https://sonarcloud.io

sonar.projectKey=collaborative-google-docs
sonar.organization=your-org-key

sonar.projectName=Collaborative Google Docs
sonar.projectVersion=1.0

sonar.sources=frontend/js,backend
sonar.tests=backend
sonar.test.inclusions=**/*.test.js
sonar.exclusions=node_modules/**,coverage/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=coverage/test-reporter.xml

sonar.sourceEncoding=UTF-8
